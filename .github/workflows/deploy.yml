name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  deployments: write
  contents: read

jobs:
  deploy:
    name: Build on Server and Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://aw.kasunc.uk
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start deployment
        uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: production
          ref: ${{ github.ref }}

      - name: Copy source files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ".,!node_modules,!.next,!.git"
          target: "~/Hosted/AudioWeb"
          timeout: 5m
          strip_components: 1
          overwrite: true
          debug: true

      - name: Build and Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 20m
          script: |
            cd ~/Hosted/AudioWeb
            
            # Stop and remove old container
            docker compose down || true
            
            # Build the new image on the server
            docker build -t audioweb:${{ github.sha }} -t audioweb:latest .
            
            # Start new container
            docker compose up -d
            
            # Clean up old images
            docker image prune -f
            
            echo "Deployment completed successfully!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Wait for container to be healthy (max 60 seconds)
            timeout 60 bash -c 'until docker ps | grep audioweb | grep -q healthy; do sleep 2; done' || echo "Container started, health check skipped"
            docker ps | grep audioweb
            echo "Deployment verification complete!"

      - name: Update deployment status (success)
        uses: bobheadxi/deployments@v1
        if: success()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          env: ${{ steps.deployment.outputs.env }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          env_url: https://aw.kasunc.uk

      - name: Update deployment status (failure)
        uses: bobheadxi/deployments@v1
        if: failure() && steps.deployment.outputs.deployment_id != ''
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          env: ${{ steps.deployment.outputs.env }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
