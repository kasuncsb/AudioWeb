name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  deployments: write
  contents: read

jobs:
  deploy:
    name: Deploy on Server
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://aw.kasunc.uk
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy source files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ".,!node_modules,!.next,!.git"
          target: "~/Hosted/AudioWeb"
          timeout: 5m
          strip_components: 1
          overwrite: true

      - name: Build and Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 20m
          script: |
            cd ~/Hosted/AudioWeb
            
            # Stop and remove old container
            docker compose down || true
            
            # Build the new image
            docker build -t audioweb:latest .
            
            # Start new container
            docker compose up -d
            
            # Remove dangling images
            docker image prune -f
            
            echo "Deployment completed successfully!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            echo "Waiting for application to respond..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8081/api/health > /dev/null 2>&1; then
                echo "Application is healthy!"
                docker ps | grep audioweb
                exit 0
              fi
              echo "Attempt $i/10: waiting..."
              sleep 3
            done
            echo "Health check failed. Container logs:"
            docker logs audioweb --tail 30
            exit 1
