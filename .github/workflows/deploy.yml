name: Deploy to Production (Alternative)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build on Server and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy source files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ".,!node_modules,!.next,!.git"
          target: "~/Hosted/AudioWeb"
          timeout: 5m
          strip_components: 1
          overwrite: true
          debug: true

      - name: Build and Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 20m
          script: |
            cd ~/Hosted/AudioWeb
            
            # Stop and remove old container
            docker-compose down || true
            
            # Build the new image on the server
            docker build -t audioweb:${{ github.sha }} -t audioweb:latest .
            
            # Start new container
            docker-compose up -d
            
            # Clean up old images
            docker image prune -f
            
            echo "Deployment completed successfully!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Wait for container to be healthy (max 60 seconds)
            timeout 60 bash -c 'until docker ps | grep audioweb | grep -q healthy; do sleep 2; done' || echo "Container started, health check skipped"
            docker ps | grep audioweb
            echo "Deployment verification complete!"
