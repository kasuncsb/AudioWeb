name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  deployments: write
  contents: write

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    name: Deploy on Server
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://aw.kasunc.uk
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine bump strategy from commit message
        if: github.event_name == 'push'
        id: bump
        run: |
          msg="$(printf '%s' "${{ github.event.head_commit.message }}" | head -n1)"
          bump="patch"
          increment=5

          if echo "$msg" | grep -Eiq '^feat(\(.+\))?:'; then
            bump="major"
            increment=1
          elif echo "$msg" | grep -Eiq '^refactor(\(.+\))?:|^perf(\(.+\))?:'; then
            bump="minor"
            increment=3
          elif echo "$msg" | grep -Eiq '^fix(\(.+\))?:|^chore(\(.+\))?:|^docs(\(.+\))?:|^style(\(.+\))?:|^test(\(.+\))?:|^build(\(.+\))?:|^ci(\(.+\))?:|^revert(\(.+\))?:|^merge(\(.+\))?:'; then
            bump="patch"
            increment=5
          fi

          echo "bump_type=$bump" >> $GITHUB_OUTPUT
          echo "increment=$increment" >> $GITHUB_OUTPUT

      - name: Bump package.json version only
        if: github.event_name == 'push'
        id: version
        run: |
          node -e "
          const fs = require('fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const [major, minor, patch] = (pkg.version || '0.0.0').split('.').map(Number);
          const bump = '${{ steps.bump.outputs.bump_type }}';
          const increment = Number('${{ steps.bump.outputs.increment }}') || 1;
          let next = [major || 0, minor || 0, patch || 0];
          if (bump === 'major') next = [next[0] + increment, 0, 0];
          else if (bump === 'minor') next = [next[0], next[1] + increment, 0];
          else next = [next[0], next[1], next[2] + increment];
          pkg.version = next.join('.');
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit and push package.json version
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump package version to ${{ steps.version.outputs.version }} (${{ steps.bump.outputs.bump_type }}+${{ steps.bump.outputs.increment }})"
          git push origin main

      - name: Copy source files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ".,!node_modules,!.next,!.git"
          target: "~/Hosted/AudioWeb"
          timeout: 5m
          strip_components: 1
          overwrite: true

      - name: Build and Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 20m
          script: |
            cd ~/Hosted/AudioWeb
            
            # Stop and remove old container
            docker compose down || true
            
            # Build the new image
            docker build -t audioweb:latest .
            
            # Start new container
            docker compose up -d
            
            # Remove dangling images
            docker image prune -f
            
            echo "Deployment completed successfully!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            echo "Waiting for application to respond..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8081/api/health > /dev/null 2>&1; then
                echo "Application is healthy!"
                docker ps | grep audioweb
                exit 0
              fi
              echo "Attempt $i/10: waiting..."
              sleep 3
            done
            echo "Health check failed. Container logs:"
            docker logs audioweb --tail 30
            exit 1
