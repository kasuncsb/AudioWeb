services:
  audioweb:
    build:
      context: .
      dockerfile: Dockerfile
    image: audioweb:latest
    container_name: audioweb
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - audioweb-network

networks:
  audioweb-network:
    driver: bridge
