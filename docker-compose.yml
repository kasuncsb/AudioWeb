version: '3.8'

services:
  audioweb:
    build:
      context: .
      dockerfile: Dockerfile
    image: audioweb:latest
    container_name: audioweb
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - audioweb-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  audioweb-network:
    driver: bridge
